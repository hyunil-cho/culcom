spring:
  application:
    name: culcom-backend

  profiles:
    active: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 3600

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8081
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    admin-key: ${KAKAO_ADMIN_KEY:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/api/public/board/kakao/callback}
  sync:
    base-url: ${KAKAO_SYNC_BASE_URL:https://pf-link.kakao.com/qr/_qFHUn/pages/_MM}
