spring:
  application:
    name: culcom-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 1800

sms:
  api-base-url: ${SMS_API_BASE_URL:https://www.mymunja.co.kr/Remote}
  sms-endpoint: ${SMS_ENDPOINT:/RemoteSms.html}
  lms-endpoint: ${LMS_ENDPOINT:/RemoteMms.html}
  check-endpoint: ${SMS_CHECK_ENDPOINT:/RemoteCheck.html}
  max-sms-bytes: ${SMS_MAX_BYTES:90}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8081
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
meta:
  webhook:
    verify-token: ${META_VERIFY_TOKEN:}

zapier:
  secret: ${ZAPIER_SECRET:eutgumi}

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    admin-key: ${KAKAO_ADMIN_KEY:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/api/public/board/kakao/callback}
  sync:
    base-url: ${KAKAO_SYNC_BASE_URL:https://pf-link.kakao.com/qr/_kXQxlX/pages/_xlM}
