spring:
  application:
    name: culcom-backend

  profiles:
    active: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
    timeout: 3600

server:
  port: 8081
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
