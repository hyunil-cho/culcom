{{define "opens/postponement.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업 연기 요청 - 컬컴</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .postpone-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 520px;
            margin-top: 30px;
        }
        .postpone-header { text-align: center; margin-bottom: 30px; }
        .postpone-header h1 { color: #4a90e2; font-size: 1.8rem; margin-bottom: 10px; }
        .postpone-header p { color: #666; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-input, .form-textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 1rem; transition: border-color 0.2s; box-sizing: border-box;
        }
        .form-input:focus, .form-textarea:focus { border-color: #4a90e2; outline: none; }
        .form-textarea { font-family: inherit; resize: vertical; min-height: 90px; }
        .btn-submit, .btn-search-member {
            width: 100%; padding: 14px; color: white; border: none; border-radius: 6px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        .btn-submit { background: #4a90e2; }
        .btn-submit:hover { background: #357abd; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .btn-search-member { background: #10b981; }
        .btn-search-member:hover { background: #059669; }
        .notice-box {
            background: #fff9db; padding: 15px; border-radius: 6px;
            border-left: 4px solid #fcc419; margin-top: 25px; font-size: 0.85rem; color: #856404;
        }
        .member-info-card {
            background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 10px;
            padding: 15px; margin-bottom: 20px;
        }
        .member-info-card h3 { margin: 0 0 10px; color: #166534; font-size: 1rem; }
        .member-info-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 0.9rem; }
        .member-info-row .label { color: #555; font-weight: 600; min-width: 70px; }
        .member-info-row .value { color: #333; }
        .membership-card {
            border: 1.5px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.2s;
        }
        .membership-card:hover { border-color: #4a90e2; background: #f0f7ff; }
        .membership-card.selected { border-color: #4a90e2; background: #e0f2fe; }
        .membership-card.disabled { opacity: 0.5; cursor: not-allowed; border-color: #eee; }
        .membership-name { font-weight: 700; color: #333; font-size: 0.95rem; }
        .membership-detail { font-size: 0.82rem; color: #666; margin-top: 4px; }
        .membership-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-warn { background: #fef9c3; color: #854d0e; }
        .badge-none { background: #fee2e2; color: #991b1b; }
        #step2, #step3 { display: none; }
        .step-divider {
            border: none; border-top: 1px dashed #ddd; margin: 25px 0;
        }
        .error-msg { color: #dc2626; font-size: 0.9rem; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="postpone-card">
        <div class="postpone-header">
            <h1>📅 수업 연기 요청</h1>
            <p>회원 정보를 확인한 후 연기 요청을 진행합니다.</p>
        </div>

        <!-- STEP 1: 회원 검색 -->
        <div id="step1">
            <div class="form-group">
                <label class="form-label">이름 <span style="color: #e74c3c;">*</span></label>
                <input type="text" id="searchName" class="form-input" placeholder="성함을 입력하세요" required>
            </div>
            <div class="form-group">
                <label class="form-label">연락처 <span style="color: #e74c3c;">*</span></label>
                <input type="tel" id="searchPhone" class="form-input" placeholder="01000000000" required>
            </div>
            <button type="button" class="btn-search-member" onclick="searchMember()">🔍 회원 검색</button>
            <div id="searchError" class="error-msg"></div>
        </div>

        <!-- STEP 2: 회원 확인 + 멤버십 선택 -->
        <div id="step2">
            <div id="memberInfoArea"></div>

            <div class="form-group">
                <label class="form-label">연기할 멤버십 선택 <span style="color: #e74c3c;">*</span></label>
                <div id="membershipList"></div>
            </div>

            <hr class="step-divider">
            <button type="button" class="btn-submit" onclick="goToStep3()" id="btnStep3" disabled>다음: 연기 상세 입력 →</button>
            <button type="button" style="width:100%; padding:10px; background:none; border:1px solid #ddd; border-radius:6px; color:#666; cursor:pointer; margin-top:8px;" onclick="resetSearch()">← 다시 검색</button>
        </div>

        <!-- STEP 3: 연기 상세 입력 + 제출 -->
        <div id="step3">
            <div id="selectedSummary" class="member-info-card" style="background:#e0f2fe; border-color:#93c5fd;"></div>

            <form action="/api/postponement/submit" method="POST" id="postponeForm">
                <input type="hidden" name="name" id="formName">
                <input type="hidden" name="phone" id="formPhone">
                <input type="hidden" name="branch_id" id="formBranchId">
                <input type="hidden" name="member_seq" id="formMemberSeq">
                <input type="hidden" name="member_membership_seq" id="formMemberMembershipSeq">

                <div class="form-group">
                    <label class="form-label">수강 중인 수업 <span style="color: #e74c3c;">*</span></label>
                    <select name="current_class" id="currentClass" class="form-input" required>
                        <option value="">수업을 선택해 주세요</option>
                    </select>
                    <input type="hidden" name="time_slot" id="formTimeSlot">
                </div>

                <div class="form-group">
                    <label class="form-label">연기 요청 기간 <span style="color: #e74c3c;">*</span></label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="date" name="start_date" class="form-input" required>
                        <span>~</span>
                        <input type="date" name="end_date" class="form-input" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">연기 사유 <span style="color: #e74c3c;">*</span></label>
                    <select name="reason" id="reasonSelect" class="form-input" required onchange="toggleReasonCustom(this)">
                        <option value="">사유를 선택해 주세요</option>
                        <option value="개인 사정 (출장/여행)">개인 사정 (출장/여행)</option>
                        <option value="건강 상의 이유">건강 상의 이유</option>
                        <option value="업무 일정 변경">업무 일정 변경</option>
                        <option value="가족 행사 / 경조사">가족 행사 / 경조사</option>
                        <option value="시험 준비">시험 준비</option>
                        <option value="이사 / 거주지 변경">이사 / 거주지 변경</option>
                        <option value="기타">기타 (직접 입력)</option>
                    </select>
                    <textarea name="reason_custom" id="reasonCustom" class="form-textarea" placeholder="연기 사유를 직접 입력해주세요." style="display:none; margin-top:10px;"></textarea>
                </div>

                <button type="submit" class="btn-submit">요청 제출하기</button>
            </form>
            <button type="button" style="width:100%; padding:10px; background:none; border:1px solid #ddd; border-radius:6px; color:#666; cursor:pointer; margin-top:8px;" onclick="backToStep2()">← 멤버십 선택으로</button>
        </div>

        <div class="notice-box">
            <strong>⚠️ 안내사항</strong>
            <ul style="margin: 5px 0 0 18px; padding: 0;">
                <li>연기 요청은 관리자 확인 후 승인됩니다.</li>
                <li>연기 가능 횟수 및 기간은 멤버십에 따릅니다.</li>
                <li>승인 결과는 입력하신 연락처로 안내드립니다.</li>
            </ul>
        </div>
    </div>

<script>
let currentMember = null;
let selectedMembershipSeq = null;

function searchMember() {
    const name = document.getElementById('searchName').value.trim();
    const phone = document.getElementById('searchPhone').value.trim();
    const errEl = document.getElementById('searchError');
    errEl.style.display = 'none';

    if (!name || !phone) {
        errEl.textContent = '이름과 연락처를 모두 입력해 주세요.';
        errEl.style.display = 'block';
        return;
    }

    fetch(`/api/postponement/search-member?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`)
        .then(res => res.json())
        .then(data => {
            if (!data.members || data.members.length === 0) {
                errEl.textContent = '일치하는 회원 정보를 찾을 수 없습니다. 이름과 연락처를 다시 확인해 주세요.';
                errEl.style.display = 'block';
                return;
            }

            // 첫 번째 매칭 회원 사용
            currentMember = data.members[0];
            showStep2();
        })
        .catch(() => {
            errEl.textContent = '검색 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
            errEl.style.display = 'block';
        });
}

function showStep2() {
    const m = currentMember;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';

    // 회원 정보 표시
    document.getElementById('memberInfoArea').innerHTML = `
        <div class="member-info-card">
            <h3>✅ 회원 정보 확인</h3>
            <div class="member-info-row"><span class="label">이름</span><span class="value">${m.name}</span></div>
            <div class="member-info-row"><span class="label">연락처</span><span class="value">${m.phone_number}</span></div>
            <div class="member-info-row"><span class="label">소속지점</span><span class="value">${m.branch_name}</span></div>
            ${m.level ? `<div class="member-info-row"><span class="label">레벨</span><span class="value">${m.level}</span></div>` : ''}
        </div>
    `;

    // 멤버십 목록
    const listEl = document.getElementById('membershipList');
    if (!m.memberships || m.memberships.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">활성 멤버십이 없습니다.</div>';
        return;
    }

    listEl.innerHTML = m.memberships.map(ms => {
        const remaining = ms.PostponeTotal - ms.PostponeUsed;
        const canPostpone = remaining > 0;
        const badgeClass = remaining >= 2 ? 'badge-ok' : (remaining === 1 ? 'badge-warn' : 'badge-none');

        return `
            <div class="membership-card ${canPostpone ? '' : 'disabled'}" data-seq="${ms.Seq}" onclick="${canPostpone ? `selectMembership(${ms.Seq})` : ''}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="membership-name">${ms.MembershipName}</span>
                    <span class="membership-badge ${badgeClass}">연기 ${remaining}/${ms.PostponeTotal}회 남음</span>
                </div>
                <div class="membership-detail">
                    기간: ${ms.StartDate} ~ ${ms.ExpiryDate} &nbsp;|&nbsp;
                    수업: ${ms.UsedCount}/${ms.TotalCount}회 사용
                    ${!canPostpone ? '<br><span style="color:#dc2626; font-weight:600;">연기 가능 횟수를 모두 사용했습니다.</span>' : ''}
                </div>
            </div>
        `;
    }).join('');

    selectedMembershipSeq = null;
    document.getElementById('btnStep3').disabled = true;
}

function selectMembership(seq) {
    selectedMembershipSeq = seq;
    document.querySelectorAll('.membership-card').forEach(el => el.classList.remove('selected'));
    const card = document.querySelector(`.membership-card[data-seq="${seq}"]`);
    if (card && !card.classList.contains('disabled')) {
        card.classList.add('selected');
        document.getElementById('btnStep3').disabled = false;
    }
}

function goToStep3() {
    if (!selectedMembershipSeq) return;
    const m = currentMember;

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';

    // hidden fields
    document.getElementById('formName').value = m.name;
    document.getElementById('formPhone').value = m.phone_number;
    document.getElementById('formBranchId').value = m.branch_seq;
    document.getElementById('formMemberSeq').value = m.seq;
    document.getElementById('formMemberMembershipSeq').value = selectedMembershipSeq;

    // 선택 요약
    const ms = m.memberships.find(x => x.Seq === selectedMembershipSeq);
    document.getElementById('selectedSummary').innerHTML = `
        <h3 style="margin:0 0 8px; color:#1e40af;">📋 요청 요약</h3>
        <div class="member-info-row"><span class="label">회원</span><span class="value">${m.name} (${m.phone_number})</span></div>
        <div class="member-info-row"><span class="label">지점</span><span class="value">${m.branch_name}</span></div>
        <div class="member-info-row"><span class="label">멤버십</span><span class="value">${ms ? ms.MembershipName : ''}</span></div>
    `;

    // 수업 드롭다운 채우기
    const classSelect = document.getElementById('currentClass');
    classSelect.innerHTML = '<option value="">수업을 선택해 주세요</option>';
    if (m.classes && m.classes.length > 0) {
        m.classes.forEach(cls => {
            const opt = document.createElement('option');
            opt.value = cls.name;
            opt.dataset.slot = cls.time_slot_name + ' (' + cls.start_time + ' ~ ' + cls.end_time + ')';
            opt.textContent = cls.name + ' [' + cls.time_slot_name + ']';
            classSelect.appendChild(opt);
        });
    }

    // 수업 선택 시 time_slot hidden 업데이트
    classSelect.onchange = function() {
        const opt = this.options[this.selectedIndex];
        document.getElementById('formTimeSlot').value = opt.dataset.slot || '';
    };
}

function backToStep2() {
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

function resetSearch() {
    currentMember = null;
    selectedMembershipSeq = null;
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    document.getElementById('searchError').style.display = 'none';
}

function toggleReasonCustom(select) {
    const custom = document.getElementById('reasonCustom');
    if (select.value === '기타') {
        custom.style.display = 'block';
        custom.required = true;
        custom.focus();
    } else {
        custom.style.display = 'none';
        custom.required = false;
        custom.value = '';
    }
}

// Enter 키로 검색
document.addEventListener('DOMContentLoaded', function() {
    ['searchName', 'searchPhone'].forEach(id => {
        document.getElementById(id).addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); searchMember(); }
        });
    });
});
</script>
</body>
</html>
{{end}}
