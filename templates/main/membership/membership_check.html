{{define "membership_check.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멤버쉽 확인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            text-align: center;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.8rem;
            color: #fff;
        }
        .card h1 {
            font-size: 1.6rem;
            color: #2d3748;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .card p {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.05rem;
            color: #2d3748;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 1px;
            text-align: center;
            font-family: 'SF Mono', monospace;
        }
        .input-group input::placeholder {
            color: #a0aec0;
            letter-spacing: 0;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
        }
        .input-group input:focus {
            border-color: #667eea;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .helper {
            margin-top: 16px;
            font-size: 0.8rem;
            color: #a0aec0;
        }
        .error-msg {
            display: none;
            color: #e53e3e;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">M</div>
        <h1>멤버쉽 확인</h1>
        <p>등록하신 전화번호를 입력하시면<br>멤버쉽 정보를 확인하실 수 있습니다.</p>

        <form action="/complex/membership/result" method="GET" onsubmit="return validatePhone()">
            <div id="errorMsg" class="error-msg"></div>
            <div class="input-group">
                <input type="tel" id="phoneInput" name="phone" placeholder="전화번호 입력 (01012345678)" maxlength="11" required>
            </div>
            <button type="submit" class="btn-submit">조회하기</button>
        </form>

        <div class="helper">하이픈(-) 없이 숫자만 입력해주세요</div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        phoneInput.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 11);
        });

        function validatePhone() {
            const val = phoneInput.value;
            const err = document.getElementById('errorMsg');
            if (!/^010[0-9]{8}$/.test(val)) {
                err.textContent = '010으로 시작하는 11자리 번호를 입력해주세요.';
                err.style.display = 'block';
                return false;
            }
            err.style.display = 'none';
            return true;
        }
    </script>
</body>
</html>
{{end}}
