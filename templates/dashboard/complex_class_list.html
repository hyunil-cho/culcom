{{define "dashboard/complex_class_list.html"}}
<!DOCTYPE html>
<html lang="ko">
<body>
    {{template "complex_sidebar" .}}
    <div class="main-wrapper">
        {{template "header" .}}
        <main class="content">
            <div class="content-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <a href="/complex/management/add" class="btn-primary" style="background: #10b981;">➕ 새 수업 추가</a>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>수업 이름</th>
                                <th>시간대 슬롯</th>
                                <th>설명</th>
                                <th style="text-align: center;">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{range .Classes}}
                            <tr>
                                <td><strong>{{.Name}}</strong></td>
                                <td><span class="status-badge status-active">{{.TimeSlotName}}</span></td>
                                <td>{{.Description}}</td>
                                <td style="text-align: center;">
                                    <a href="/complex/management/edit?id={{.ID}}" class="btn-table-action">수정</a>
                                </td>
                            </tr>
                            {{end}}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
{{end}}
