{{define "header"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 백오피스</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/pagination-utils.js"></script>
    <script>
    // 지점 정보 전역 변수 (페이지 로드 초기에 설정)
        window.branchInfo = {
            name: '{{.SelectedBranchName}}',
            manager: '{{.SelectedBranchManager}}',
            address: '{{.SelectedBranchAddress}}',
            directions: '{{.SelectedBranchDirections}}'
        };
        console.log('🏢 Dashboard - Branch Info Initialized:', window.branchInfo);
    </script>
    <script src="/static/js/template-utils.js"></script>
    <script src="/static/js/modal-manager.js"></script>
<header class="top-header">
    
    <div class="header-left">
        <h1>{{.Title}}</h1>
    </div>
    <div class="header-right">
        <div class="branch-selector" style="margin-right: 2rem;">
            <label style="margin-right: 0.5rem; color: #5a6c7d; font-size: 0.9rem;">지점 선택:</label>
            <select id="branchSelect" onchange="changeBranch(this.value)" style="padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; cursor: pointer; background: white;">
                {{if .BranchList}}
                    {{range .BranchList}}
                        <option value="{{.alias}}" {{if eq .alias $.SelectedBranch}}selected{{end}}>{{.name}}</option>
                    {{end}}
                {{else}}
                    <option value="">지점 없음</option>
                {{end}}
            </select>
        </div>
        <div class="user-info">
            <span class="user-avatar">👤</span>
            <span class="user-name">관리자</span>
            <a href="javascript:void(0);" class="logout-btn" onclick="showLogoutModal()">로그아웃</a>
        </div>
    </div>
</header>

<script>
// 로그아웃 모달 표시
function showLogoutModal() {
    // 기존 모달이 있으면 제거
    const existingModal = document.getElementById('logoutModal');
    if (existingModal) {
        existingModal.remove();
    }

    // 모달 HTML 생성
    const modalHTML = `
        <div id="logoutModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 10000; align-items: center; justify-content: center;">
            <div style="background: white; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);">
                <div style="padding: 1.5rem 2rem; border-bottom: 2px solid #4a90e2;">
                    <h3 style="margin: 0; font-size: 1.25rem; color: #2c3e50;">로그아웃 확인</h3>
                </div>
                <div style="padding: 2rem; text-align: center; color: #666; font-size: 0.95rem;">
                    정말로 로그아웃 하시겠습니까?
                </div>
                <div style="padding: 1rem 2rem; border-top: 1px solid #e0e0e0; display: flex; gap: 0.75rem;">
                    <button onclick="closeLogoutModal()" style="flex: 1; padding: 0.75rem; font-size: 1rem; border: 1px solid #ddd; background: white; color: #666; border-radius: 6px; cursor: pointer;">취소</button>
                    <button onclick="confirmLogout()" style="flex: 1; padding: 0.75rem; font-size: 1rem; border: none; background: #4a90e2; color: white; border-radius: 6px; cursor: pointer;">확인</button>
                </div>
            </div>
        </div>
    `;

    // 모달을 body에 추가
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    // 배경 클릭 시 닫기
    document.getElementById('logoutModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeLogoutModal();
        }
    });
}

function closeLogoutModal() {
    const modal = document.getElementById('logoutModal');
    if (modal) {
        modal.remove();
    }
}

function confirmLogout() {
    window.location.href = '/logout';
}

function changeBranch(branchCode) {
    // localStorage에 영문 코드로 저장 (클라이언트 측 복원용)
    if (branchCode === '') {
        localStorage.removeItem('selectedBranch');
    } else {
        localStorage.setItem('selectedBranch', branchCode);
    }
    
    // 현재 URL에 지점 파라미터 추가하여 페이지 리로드 (서버에서 세션에 저장함)
    const currentUrl = new URL(window.location.href);
    
    if (branchCode === '') {
        currentUrl.searchParams.delete('branch');
    } else {
        currentUrl.searchParams.set('branch', branchCode);
    }
    
    // 페이지 리로드
    window.location.href = currentUrl.toString();
}

// 페이지 로드 시 저장된 지점 복원
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlBranch = urlParams.get('branch');
    const savedBranch = localStorage.getItem('selectedBranch');
    const branchSelect = document.getElementById('branchSelect');
    const sidebarTitle = document.querySelector('.sidebar-header h2');
    
    // URL 파라미터가 있으면 우선 사용 (기본값은 영문 코드 'gasan')
    let currentBranch = urlBranch || savedBranch || 'gasan';
    
    // URL과 localStorage 동기화
    if (!urlBranch && savedBranch) {
        // URL에 지점 파라미터 없으면 추가
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('branch', savedBranch);
        window.history.replaceState({}, '', currentUrl.toString());
        currentBranch = savedBranch;
    } else if (urlBranch) {
        // URL 파라미터로 localStorage 업데이트
        localStorage.setItem('selectedBranch', urlBranch);
        currentBranch = urlBranch;
    }
    
    // 드롭다운 선택 상태 설정 (영문 코드)
    if (branchSelect) {
        branchSelect.value = currentBranch || '';
    }
    
    // 사이드바 제목 업데이트 (서버에서 전달받은 한글 이름 사용)
    if (sidebarTitle) {
        const branchName = '{{.SelectedBranchName}}';
        const isComplex = window.location.pathname.startsWith('/complex');
        const prefix = isComplex ? '🏗️' : '🏢';
        const suffix = isComplex ? 'COMPLEX' : '백오피스';
        
        if (branchName && branchName !== '') {
            sidebarTitle.textContent = `${prefix} ${branchName}-${suffix}`;
        } else {
            sidebarTitle.textContent = `${prefix} ${suffix}`;
        }
    }
});
</script>
{{end}}
