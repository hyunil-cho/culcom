{{define "board/kakao-success.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{.Title}} - CulCom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            overflow: hidden; /* 스크롤 방지 */
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #fff;
            color: #333;
        }
        .success-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .welcome-img-container {
            width: 100%;
            max-width: 320px; /* 크기 축소 */
            margin-bottom: 1.5rem;
            animation: fadeInScale 0.8s ease-out;
        }
        .welcome-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .greeting {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }
        .instruction {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 2rem;
            color: #444;
            letter-spacing: -0.3px;
        }
        .branding {
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 1.5rem;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            padding: 12px 40px;
            background-color: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-home:hover {
            background-color: #333;
            transform: translateY(-1px);
        }
        @media (max-height: 600px) {
            .welcome-img-container { max-width: 240px; margin-bottom: 1rem; }
            .greeting { font-size: 1.5rem; }
            .instruction { font-size: 1.1rem; margin-bottom: 1.5rem; }
            .branding { margin-bottom: 1rem; }
        }
    </style>
</head>
<body>

<div class="success-wrapper">
    <div class="welcome-img-container">
        <img src="/static/img/success-welcome.png" alt="Welcome" class="welcome-img">
    </div>

    <h1 class="greeting">{{.MemberName}}님, 환영합니다 :)</h1>
    <p class="instruction">빈자리 안내드릴게요</p>
    
    <p class="branding">- 컬컴 평생교육원 -</p>

    <div class="actions">
        <a href="/" class="btn-home">메인으로 돌아가기</a>
    </div>
</div>

</body>
</html>
{{end}}
