{{define "memberships/add.html"}}
<!DOCTYPE html>
<html lang="ko">
<body>
    {{template "complex_sidebar" .}}
    
    <div class="main-wrapper">
        {{template "header" .}}
        
        <main class="content">
            <div class="detail-actions">
                <a href="/complex/memberships" class="btn-back">← 목록으로</a>
            </div>

            <div class="content-card">
                <div class="form-header">
                    <h2>신규 멤버십 등록</h2>
                </div>
                <form action="/complex/memberships/add" method="POST">
                    <div class="form-body">
                        <div class="form-row">
                            <label class="form-label">멤버십 이름 <span class="required">*</span></label>
                            <input type="text" name="name" class="form-input" placeholder="예: 3개월 주2회 멤버십" required>
                        </div>
                        
                        <div class="form-row">
                            <label class="form-label">유효 기간 <span class="required">*</span></label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" name="duration_value" class="form-input" style="flex: 2;" placeholder="예: 3" required>
                                <select name="duration_unit" class="form-input" style="flex: 1;">
                                    <option value="day">일</option>
                                    <option value="month" selected>개월</option>
                                    <option value="year">년</option>
                                </select>
                            </div>
                            <small style="color: #666; font-size: 0.85rem; margin-top: 0.25rem; display: block;">멤버십이 유지되는 기간을 선택하세요.</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">수강 횟수 (회) <span class="required">*</span></label>
                            <input type="number" name="count" class="form-input" placeholder="예: 24" required>
                            <small style="color: #666; font-size: 0.85rem; margin-top: 0.25rem; display: block;">해당 기간 동안 수강 가능한 총 횟수를 입력하세요.</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">판매 가격 (원) <span class="required">*</span></label>
                            <input type="number" name="price" class="form-input" placeholder="예: 450000" required>
                            <small style="color: #666; font-size: 0.85rem; margin-top: 0.25rem; display: block;">부가세 포함 판매가를 입력하세요.</small>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary-large">💾 등록하기</button>
                        <a href="/complex/memberships" class="btn-secondary-large">취소</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
{{end}}
