{{define "dashboard/complex_branch_add.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea.form-control {
            height: 100px;
            resize: vertical;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-submit {
            padding: 10px 25px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cancel {
            padding: 10px 25px;
            background: #f3f4f6;
            color: #374151;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #d1d5db;
        }
    </style>
</head>
<body>
    {{template "complex_sidebar" .}}
    
    <div class="main-wrapper">
        {{template "header" .}}
        
        <main class="content">
            <div class="content-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>새 지점 추가</h2>
                    <a href="/complex/branches" class="btn-cancel">목록으로</a>
                </div>

                <form action="/complex/branches/store" method="POST" style="background: white; padding: 30px; border: 1px solid #ddd; border-radius: 8px; max-width: 800px;">
                    <div class="form-group">
                        <label for="name">지점명 <span style="color: #dc2626;">*</span></label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="예: 대구지점" required>
                    </div>

                    <div class="form-group">
                        <label for="alias">영문코드 (Alias) <span style="color: #dc2626;">*</span></label>
                        <input type="text" id="alias" name="alias" class="form-control" placeholder="예: daegu" required>
                        <p style="font-size: 0.85rem; color: #666; margin-top: 5px;">URL이나 시스템 식별자로 사용되는 고유 코드입니다.</p>
                    </div>

                    <div class="form-group">
                        <label for="manager">담당자</label>
                        <input type="text" id="manager" name="manager" class="form-control" placeholder="지점 담당자 이름">
                    </div>

                    <div class="form-group">
                        <label for="address">주소</label>
                        <input type="text" id="address" name="address" class="form-control" placeholder="지점 위치 주소">
                    </div>

                    <div class="form-group">
                        <label for="directions">오시는 길</label>
                        <textarea id="directions" name="directions" class="form-control" placeholder="지점 방문 방법 설명"></textarea>
                    </div>

                    <div class="btn-container">
                        <button type="submit" class="btn-submit">지점 생성</button>
                        <a href="/complex/branches" class="btn-cancel">취소</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
{{end}}
