{{define "dashboard/member_edit.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{template "complex_sidebar" .}}
    
    <div class="main-wrapper">
        {{template "header" .}}
        
        <main class="content">
            <div class="detail-actions">
                <a href="/complex/members" class="btn-back">← 목록으로</a>
            </div>

            <div class="content-card">
                <div class="form-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="margin: 0;">회원 정보 수정 - {{.Member.Name}}</h2>
                    <button type="button" class="btn-secondary" style="padding: 8px 15px; font-weight: 600;" onclick="openAttendanceHistoryModal('{{.Member.Name}}')">📅 출석 히스토리 보기</button>
                </div>
                <form action="/complex/members/update" method="POST">
                    <input type="hidden" name="id" value="{{.Member.ID}}">
                    <div class="form-body">
                        <div class="form-row">
                            <label class="form-label">이름 <span class="required">*</span></label>
                            <input type="text" name="name" class="form-input" value="{{.Member.Name}}" required>
                        </div>
                        
                        <div class="form-row">
                            <label class="form-label">전화번호 <span class="required">*</span></label>
                            <input type="tel" id="phoneNumber" name="phone_number" class="form-input" value="{{.Member.PhoneNumber}}" placeholder="01012345678" pattern="^010[0-9]{8}$" maxlength="11" required>
                            <small style="color: #666; font-size: 0.85rem; margin-top: 0.25rem; display: block;">하이픈 없이 숫자만 입력해주세요 (예: 01012345678)</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">소속 지점 <span class="required">*</span></label>
                            <select name="branch_seq" class="form-input" required>
                                <option value="">-- 지점 선택 --</option>
                                {{range .BranchList}}
                                <option value="{{index . "seq"}}" {{if eq (index . "seq") $.Member.BranchSeq}}selected{{end}}>{{index . "name"}}</option>
                                {{end}}
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">레벨</label>
                            <input type="text" name="level" class="form-input" value="{{.Member.Level}}" placeholder="예: 3-">
                        </div>

                        <!-- 수업 배정 섹션 (Edit 페이지 추가) -->
                        <div class="form-row">
                            <label class="form-label">수업 시간대</label>
                            <select id="slotSelect" class="form-input" onchange="updateClassOptions()">
                                <option value="">-- 시간대 선택 --</option>
                                <option value="월수 오전">월수 오전팀 (10:00 ~ 12:00)</option>
                                <option value="화목 오후">화목 오후팀 (14:00 ~ 16:00)</option>
                                <option value="주말 집중">주말 집중팀 (13:00 ~ 17:00)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">배정 수업</label>
                            <select id="classSelect" name="class_id" class="form-input" disabled>
                                <option value="">-- 시간대를 먼저 선택하세요 --</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">소속정보</label>
                            <input type="text" name="info" class="form-input" value="{{.Member.Info}}" placeholder="예: 달서 멤버">
                        </div>

                        <div class="form-row">
                            <label class="form-label">가입일</label>
                            <input type="date" id="joinDate" name="join_date" class="form-input" value="{{.Member.JoinDate}}" onchange="calculateExpiryDate()">
                        </div>

                        <div class="form-row">
                            <label class="form-label">등급 (멤버십)</label>
                            <select id="gradeSelect" name="grade" class="form-input" onchange="calculateExpiryDate()">
                                <option value="멤버쉽" {{if eq .Member.Grade "멤버쉽"}}selected{{end}}>멤버쉽 (1개월)</option>
                                <option value="A+" {{if eq .Member.Grade "A+"}}selected{{end}}>A+ (3개월)</option>
                                <option value="VVIP" {{if eq .Member.Grade "VVIP"}}selected{{end}}>VVIP (6개월)</option>
                                <option value="VVIP+" {{if eq .Member.Grade "VVIP+"}}selected{{end}}>VVIP+ (12개월)</option>
                                <option value="H+" {{if eq .Member.Grade "H+"}}selected{{end}}>H+ (평생)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">만료일</label>
                            <input type="date" id="expiryDate" name="expiry_date" class="form-input" value="{{.Member.ExpiryDate}}" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
                            <small style="color: #666; font-size: 0.8rem; margin-top: 4px; display: block;">* 등급 선택 시 자동으로 기간이 산정됩니다.</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">최근수업일</label>
                            <input type="date" name="last_date" class="form-input" value="{{.Member.LastDate}}">
                        </div>

                        <div class="form-row">
                            <label class="form-label">잔여횟수/통계</label>
                            <input type="text" name="stats" class="form-input" value="{{.Member.Stats}}" placeholder="예: 0 did 100 left">
                        </div>

                        <div class="form-row">
                            <label class="form-label">차트넘버</label>
                            <input type="text" name="chart_number" class="form-input" value="{{.Member.ChartNumber}}" placeholder="차트 번호를 입력하세요">
                        </div>

                        <div class="form-row">
                            <label class="form-label">코멘트</label>
                            <textarea name="comment" class="form-input" style="height: 100px; resize: vertical; padding: 10px;" placeholder="직업, 관심사, 등록 동기 등 상세 정보를 입력하세요">{{.Member.Comment}}</textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary-large">💾 수정하기</button>
                        <a href="/complex/members" class="btn-secondary-large">취소</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

<script>
// Mock 데이터: 시간대별 수업 목록
const allAvailableClasses = [
    { id: "101", name: "레벨1-1반", slot: "월수 오전" },
    { id: "102", name: "레벨1-2반", slot: "월수 오전" },
    { id: "103", name: "프리토킹 A반", slot: "월수 오전" },
    { id: "201", name: "레벨2-1반", slot: "화목 오후" },
    { id: "202", name: "프리토킹 B반", slot: "화목 오후" },
    { id: "301", name: "주말 입문반", slot: "주말 집중" },
    { id: "302", name: "주말 고급반", slot: "주말 집중" }
];

function updateClassOptions() {
    const slotSelect = document.getElementById('slotSelect');
    const classSelect = document.getElementById('classSelect');
    const selectedSlot = slotSelect.value;

    classSelect.innerHTML = '<option value="">-- 수업 선택 --</option>';
    
    if (!selectedSlot) {
        classSelect.disabled = true;
        classSelect.innerHTML = '<option value="">-- 시간대를 먼저 선택하세요 --</option>';
        return;
    }

    const filteredClasses = allAvailableClasses.filter(c => c.slot === selectedSlot);
    filteredClasses.forEach(cls => {
        const option = document.createElement('option');
        option.value = cls.id;
        option.textContent = cls.name;
        classSelect.appendChild(option);
    });

    classSelect.disabled = false;
}

function calculateExpiryDate() {
    const joinDateInput = document.getElementById('joinDate');
    const gradeSelect = document.getElementById('gradeSelect');
    const expiryInput = document.getElementById('expiryDate');
    
    if (!gradeSelect || !gradeSelect.value) return;
    
    // 가입일이 없으면 오늘 날짜 기준
    let baseDate = joinDateInput && joinDateInput.value ? new Date(joinDateInput.value) : new Date();
    
    // 등급별 기간 매핑
    const gradeDuration = {
        '멤버쉽': 1,
        'A+': 3,
        'VVIP': 6,
        'VVIP+': 12,
        'H+': 120 // 10년
    };
    
    const months = gradeDuration[gradeSelect.value] || 0;
    if (months === 0) return; // 매핑된 기간이 없으면 유지

    baseDate.setMonth(baseDate.getMonth() + months);
    
    // YYYY-MM-DD 형식으로 변환
    const yyyy = baseDate.getFullYear();
    const mm = String(baseDate.getMonth() + 1).padStart(2, '0');
    const dd = String(baseDate.getDate()).padStart(2, '0');
    expiryInput.value = `${yyyy}-${mm}-${dd}`;
}

// Mock 데이터 관리 (출석 히스토리용)
const attendanceData = [];
const itemsPerPage = 10;
let currentPage = 1;

function generateMockAttendance() {
    attendanceData.length = 0; // 초기화
    const statuses = ['O', 'O', 'O', 'O', 'X', 'O', 'O', 'O'];
    const classes = ['레벨1-1반', '레벨1-2반', '프리토킹 A반'];
    const slots = ['월수 오전', '화목 오후', '주말 집중'];
    
    const today = new Date();
    for (let i = 0; i < 50; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        if (date.getDay() === 0 || date.getDay() === 6) continue;

        attendanceData.push({
            date: date.toISOString().split('T')[0],
            className: classes[Math.floor(Math.random() * classes.length)],
            slotName: slots[Math.floor(Math.random() * slots.length)],
            status: statuses[Math.floor(Math.random() * statuses.length)],
            note: i % 12 === 0 ? '지각' : '-'
        });
    }
}

function openAttendanceHistoryModal(memberName) {
    if (typeof ModalManager === 'undefined') return;
    
    generateMockAttendance();
    currentPage = 1;

    ModalManager.createCustom({
        id: 'attendanceHistoryModal',
        title: `출석 히스토리 - ${memberName}`,
        maxWidth: '800px',
        headerColor: '#4a90e2',
        contentBuilder: () => `
            <div style="padding: 10px; min-height: 550px; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;">
                    <span style="background: #e3f2fd; color: #1976d2; padding: 3px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600;">총 ${attendanceData.length}회</span>
                </div>
                <div class="attendance-table-wrapper" style="height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; flex-shrink: 0;">
                    <table class="staff-table" style="min-width: 100%; margin: 0; table-layout: fixed;">
                        <thead style="position: sticky; top: 0; z-index: 10;">
                            <tr>
                                <th style="background: #f8f9fa; width: 120px;">날짜</th>
                                <th style="background: #f8f9fa;">수업명</th>
                                <th style="background: #f8f9fa; width: 80px;">상태</th>
                                <th style="background: #f8f9fa; width: 150px;">비고</th>
                            </tr>
                        </thead>
                        <tbody id="modalAttendanceBody">
                            <!-- JS로 렌더링 -->
                        </tbody>
                    </table>
                </div>
                <!-- 공통 페이지네이션 유틸 적용 -->
                <div id="modalPaginationRoot" style="margin-top: auto; padding-top: 20px; flex-shrink: 0;">
                </div>
            </div>
        `,
        buttons: [{ text: '닫기', class: 'btn-secondary', onClick: () => ModalManager.hide('attendanceHistoryModal') }]
    });

    renderModalPage(1);
}

function renderModalPage(page) {
    currentPage = page;
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paginatedData = attendanceData.slice(start, end);
    
    const body = document.getElementById('modalAttendanceBody');
    if (!body) return;

    body.innerHTML = paginatedData.map(item => `
        <tr>
            <td style="font-family: monospace; font-size: 0.85rem;">${item.date}</td>
            <td>
                <div style="font-weight: 600; color: #4a90e2; font-size: 0.85rem;">${item.className}</div>
                <div style="font-size: 0.75rem; color: #999;">${item.slotName}</div>
            </td>
            <td>
                <span class="status-mark ${item.status === 'O' ? 'active' : ''}" style="margin: 0 auto; width: 22px; height: 22px; font-size: 0.7rem;">
                    ${item.status}
                </span>
            </td>
            <td style="color: #888; font-size: 0.8rem;">${item.note}</td>
        </tr>
    `).join('');

    // 공통 유틸리티를 사용한 페이징 렌더링
    const totalPages = Math.ceil(attendanceData.length / itemsPerPage);
    
    // 표시할 페이지 번호 배열 생성 (현재 페이지 기준 앞뒤 2개)
    const pages = [];
    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        pages.push(i);
    }

    const paginationData = {
        currentPage: currentPage,
        totalPages: totalPages,
        totalItems: attendanceData.length,
        pages: pages,
        hasPrev: currentPage > 1,
        hasNext: currentPage < totalPages
    };

    if (typeof renderPagination !== 'undefined') {
        renderPagination('#modalPaginationRoot', paginationData, {
            onPageClick: (p) => renderModalPage(p)
        });
    }
}

// 기존 전화번호 로직 유지
document.addEventListener('DOMContentLoaded', function() {
    const phoneInput = document.getElementById('phoneNumber');
    if (phoneInput) {
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            e.target.value = value;
        });
    }
});
</script>
</body>
</html>
{{end}}
