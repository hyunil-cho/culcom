{{define "dashboard/member_add.html"}}
<!DOCTYPE html>
<html lang="ko">
<body>
    {{template "complex_sidebar" .}}
    
    <div class="main-wrapper">
        {{template "header" .}}
        
        <main class="content">
            <div class="detail-actions">
                <a href="/complex/members" class="btn-back">← 목록으로</a>
            </div>

            <div class="content-card">
                <div class="form-header" style="display:flex; align-items:center; justify-content:space-between;">
                    <h2>새 회원 등록</h2>
                    <button type="button" id="btnLoadSurvey" onclick="openSurveyModal()" style="display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:#2d7a4f; color:white; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer;">
                        📋 설문 불러오기
                    </button>
                </div>

                <!-- 설문 참조 정보 패널 (불러온 경우에만 표시) -->
                <div id="surveyRefPanel" style="display:none; margin:0 0 1.5rem; background:#e8f5ee; border:1.5px solid #4caf78; border-radius:10px; padding:1.25rem 1.5rem;">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
                        <div style="font-size:1rem; font-weight:700; color:#2d7a4f;">📋 연결된 설문 정보</div>
                        <button type="button" onclick="clearSurveyRef()" style="background:none; border:none; color:#888; font-size:0.85rem; cursor:pointer;">✕ 연결 해제</button>
                    </div>
                    <div id="surveyRefContent" style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem 1.5rem; font-size:0.88rem; color:#1a1a1a;"></div>
                    <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid #c5e5d0;">
                        <div style="font-size:0.85rem; font-weight:700; color:#2d7a4f; margin-bottom:0.5rem;">설문 응답 상세</div>
                        <div id="surveyRefDetail" style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem 1.5rem; font-size:0.83rem; color:#444;"></div>
                    </div>
                </div>

                <form action="/complex/members/update" method="POST">
                    <div class="form-body">
                        <div class="form-row">
                            <label class="form-label">이름 <span class="required">*</span></label>
                            <input type="text" name="name" class="form-input" placeholder="이름을 입력하세요" required>
                        </div>
                        
                        <div class="form-row">
                            <label class="form-label">전화번호 <span class="required">*</span></label>
                            <input type="tel" id="phoneNumber" name="phone_number" class="form-input" placeholder="01012345678" pattern="^010[0-9]{8}$" maxlength="11" required>
                            <small style="color: #666; font-size: 0.85rem; margin-top: 0.25rem; display: block;">하이픈 없이 숫자만 입력해주세요 (예: 01012345678)</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">소속 지점 <span class="required">*</span></label>
                            <select name="branch_seq" class="form-input" required>
                                <option value="">-- 지점 선택 --</option>
                                {{range .BranchList}}
                                <option value="{{index . "seq"}}">{{index . "name"}}</option>
                                {{end}}
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">레벨</label>
                            <input type="text" name="level" class="form-input" placeholder="예: 3-">
                        </div>

                        <!-- 수업 배정 섹션 (톤앤매너 수정) -->
                        <div class="form-row">
                            <label class="form-label">수업 시간대</label>
                            <select id="slotSelect" class="form-input" onchange="updateClassOptions()">
                                <option value="">-- 시간대 선택 --</option>
                                <option value="월수 오전">월수 오전팀 (10:00 ~ 12:00)</option>
                                <option value="화목 오후">화목 오후팀 (14:00 ~ 16:00)</option>
                                <option value="주말 집중">주말 집중팀 (13:00 ~ 17:00)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">배정 수업</label>
                            <select id="classSelect" name="class_id" class="form-input" disabled>
                                <option value="">-- 시간대를 먼저 선택하세요 --</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">인적사항</label>
                            <input type="text" name="info" class="form-input" placeholder="예: 대학생, 영어회화 관심">
                        </div>

                        <div class="form-row">
                            <label class="form-label">가입일</label>
                            <input type="date" id="joinDate" name="join_date" class="form-input" onchange="calculateExpiryDate()">
                        </div>

                        <div class="form-row">
                            <label class="form-label">상태</label>
                            <select name="status" class="form-input">
                                <option value="">-- 선택 --</option>
                                <option value="미가입/예정">미가입/예정</option>
                                <option value="디파짓">디파짓</option>
                                <option value="양도/6개월미만">양도/6개월미만</option>
                                <option value="가입(완불)">가입(완불)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">등급 (멤버십)</label>
                            <select id="gradeSelect" name="grade" class="form-input" onchange="calculateExpiryDate()">
                                <option value="멤버쉽">멤버쉽 (1개월)</option>
                                <option value="A+">A+ (3개월)</option>
                                <option value="VVIP">VVIP (6개월)</option>
                                <option value="VVIP+">VVIP+ (12개월)</option>
                                <option value="H+">H+ (평생)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">만료일</label>
                            <input type="date" id="expiryDate" name="expiry_date" class="form-input" readonly style="background-color: #f8f9fa; cursor: not-allowed;">
                            <small style="color: #666; font-size: 0.8rem; margin-top: 4px; display: block;">* 등급 선택 시 자동으로 기간이 산정됩니다.</small>
                        </div>

                        <div class="form-row">
                            <label class="form-label">금액</label>
                            <input type="text" name="price" class="form-input" placeholder="예: 450,000">
                        </div>

                        <div class="form-row">
                            <label class="form-label">결제방법</label>
                            <div>
                                <select id="paymentMethodSelect" name="payment_method" class="form-input" onchange="togglePaymentCustom(this)">
                                    <option value="">-- 선택 --</option>
                                    <option value="카드">카드</option>
                                    <option value="온라인구독">온라인구독</option>
                                    <option value="온라인신용">온라인신용</option>
                                    <option value="토스링크">토스링크</option>
                                    <option value="이체(개인통장)">이체(개인통장)</option>
                                    <option value="이체(법인통장)">이체(법인통장)</option>
                                    <option value="현금">현금</option>
                                    <option value="기타">기타 (직접입력)</option>
                                </select>
                                <input type="text" id="paymentMethodCustom" name="payment_method_custom" class="form-input" placeholder="결제방법을 직접 입력하세요" style="display: none; margin-top: 8px;">
                            </div>
                        </div>

                        <div class="form-row">
                            <label class="form-label">가입 경로</label>
                            <div>
                                <select id="signupChannelSelect" name="signup_channel" class="form-input" onchange="toggleSignupCustom(this)">
                                    <option value="">-- 선택 --</option>
                                    <option value="인스타그램">인스타그램</option>
                                    <option value="네이버 검색">네이버 검색</option>
                                    <option value="지인 소개">지인 소개</option>
                                    <option value="전단지">전단지</option>
                                    <option value="홈페이지">홈페이지</option>
                                    <option value="기타">기타 (직접입력)</option>
                                </select>
                                <input type="text" id="signupChannelCustom" name="signup_channel_custom" class="form-input" placeholder="가입 경로를 직접 입력하세요" style="display: none; margin-top: 8px;">
                            </div>
                        </div>

                        <div class="form-row">
                            <label class="form-label">인터뷰어</label>
                            <input type="text" name="interviewer" class="form-input" placeholder="인터뷰어 이름을 입력하세요">
                        </div>

                        <div class="form-row">
                            <label class="form-label">차트넘버</label>
                            <input type="text" name="chart_number" class="form-input" placeholder="차트 번호를 입력하세요">
                        </div>

                        <div class="form-row">
                            <label class="form-label">코멘트</label>
                            <textarea name="comment" class="form-input" style="height: 100px; resize: vertical; padding: 10px;" placeholder="직업, 관심사, 등록 동기 등 상세 정보를 입력하세요"></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary-large">💾 등록하기</button>
                        <a href="/complex/members" class="btn-secondary-large">취소</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

<script>
// Mock 데이터: 시간대별 수업 목록
const allAvailableClasses = [
    { id: "101", name: "레벨1-1반", slot: "월수 오전" },
    { id: "102", name: "레벨1-2반", slot: "월수 오전" },
    { id: "103", name: "프리토킹 A반", slot: "월수 오전" },
    { id: "201", name: "레벨2-1반", slot: "화목 오후" },
    { id: "202", name: "프리토킹 B반", slot: "화목 오후" },
    { id: "301", name: "주말 입문반", slot: "주말 집중" },
    { id: "302", name: "주말 고급반", slot: "주말 집중" }
];

function updateClassOptions() {
    const slotSelect = document.getElementById('slotSelect');
    const classSelect = document.getElementById('classSelect');
    const selectedSlot = slotSelect.value;

    // 초기화
    classSelect.innerHTML = '<option value="">-- 수업 선택 --</option>';
    
    if (!selectedSlot) {
        classSelect.disabled = true;
        classSelect.innerHTML = '<option value="">-- 시간대를 먼저 선택하세요 --</option>';
        return;
    }

    // 필터링 및 렌더링
    const filteredClasses = allAvailableClasses.filter(c => c.slot === selectedSlot);
    
    filteredClasses.forEach(cls => {
        const option = document.createElement('option');
        option.value = cls.id;
        option.textContent = cls.name;
        classSelect.appendChild(option);
    });

    classSelect.disabled = false;
}

function calculateExpiryDate() {
    const joinDateInput = document.getElementById('joinDate');
    const gradeSelect = document.getElementById('gradeSelect');
    const expiryInput = document.getElementById('expiryDate');
    
    if (!gradeSelect.value) return;
    
    // 가입일이 없으면 오늘 날짜 기준
    let baseDate = joinDateInput.value ? new Date(joinDateInput.value) : new Date();
    
    // 등급별 기간 매핑
    const gradeDuration = {
        '멤버쉽': 1,
        'A+': 3,
        'VVIP': 6,
        'VVIP+': 12,
        'H+': 120 // 10년
    };
    
    const months = gradeDuration[gradeSelect.value] || 0;
    baseDate.setMonth(baseDate.getMonth() + months);
    
    // YYYY-MM-DD 형식으로 변환
    const yyyy = baseDate.getFullYear();
    const mm = String(baseDate.getMonth() + 1).padStart(2, '0');
    const dd = String(baseDate.getDate()).padStart(2, '0');
    expiryInput.value = `${yyyy}-${mm}-${dd}`;
}

function togglePaymentCustom(select) {
    const customInput = document.getElementById('paymentMethodCustom');
    if (select.value === '기타') {
        customInput.style.display = 'block';
        customInput.focus();
    } else {
        customInput.style.display = 'none';
        customInput.value = '';
    }
}

function toggleSignupCustom(select) {
    const customInput = document.getElementById('signupChannelCustom');
    if (select.value === '기타') {
        customInput.style.display = 'block';
        customInput.focus();
    } else {
        customInput.style.display = 'none';
        customInput.value = '';
    }
}

// 전화번호 입력 검증
const phoneInput = document.getElementById('phoneNumber');
if (phoneInput) {
    phoneInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/[^0-9]/g, '');
        if (value.length > 11) {
            value = value.slice(0, 11);
        }
        e.target.value = value;
    });

    phoneInput.addEventListener('blur', function(e) {
        const value = e.target.value;
        if (value && !/^010[0-9]{8}$/.test(value)) {
            alert('전화번호는 010으로 시작하는 11자리 숫자여야 합니다.');
        }
    });
}

// =============================================
// 설문 불러오기 기능
// =============================================

// 설문 데이터 (API에서 로드)
let surveyData = [];

function openSurveyModal() {
    document.getElementById('surveyModal').style.display = 'flex';
    document.getElementById('surveyList').innerHTML = '<div style="text-align:center; padding:2rem; color:#999;">불러오는 중...</div>';

    fetch('/api/complex/survey/submissions')
        .then(res => res.json())
        .then(data => {
            surveyData = data || [];
            renderSurveyList('');
        })
        .catch(() => {
            document.getElementById('surveyList').innerHTML = '<div style="text-align:center; padding:2rem; color:#e53e3e;">설문 데이터를 불러올 수 없습니다.</div>';
        });
}

function closeSurveyModal() {
    document.getElementById('surveyModal').style.display = 'none';
}

function renderSurveyList(query) {
    const list = document.getElementById('surveyList');
    const filtered = surveyData.filter(s =>
        s.name.includes(query) || s.phone.includes(query)
    );

    if (filtered.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:2rem; color:#999; font-size:0.95rem;">검색 결과가 없습니다.</div>';
        return;
    }

    list.innerHTML = filtered.map(s => `
        <div class="survey-list-item" onclick="selectSurvey(${s.id})"
            onmouseenter="this.style.borderColor='#2d7a4f'; this.style.background='#f4fbf7';"
            onmouseleave="this.style.borderColor='#dde8e3'; this.style.background='#fff';"
            style="display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border:1.5px solid #dde8e3; border-radius:10px; cursor:pointer; transition:all 0.2s; margin-bottom:0.6rem; background:#fff;">
            <div>
                <div style="font-weight:700; font-size:1rem; color:#1a1a1a; margin-bottom:0.25rem;">
                    ${s.name} <span style="font-size:0.85rem; color:#666; font-weight:400;">${s.gender} · ${s.age_group} · ${s.location}</span>
                </div>
                <div style="font-size:0.85rem; color:#555;">
                    📞 ${formatPhone(s.phone)} &nbsp;|&nbsp; 📅 ${s.submitted_at} &nbsp;|&nbsp; 유입: ${s.ad_source}
                </div>
            </div>
            <div style="flex-shrink:0; margin-left:1rem; padding:6px 14px; background:#2d7a4f; color:white; border-radius:6px; font-size:0.82rem; font-weight:600;">선택</div>
        </div>
    `).join('');
}

function formatPhone(p) {
    const s = p.replace(/[^0-9]/g, '');
    if (s.length === 11) return s.slice(0,3) + '-' + s.slice(3,7) + '-' + s.slice(7);
    return p;
}

function selectSurvey(id) {
    const survey = surveyData.find(s => s.id === id);
    if (!survey) return;

    // 기본 필드 자동입력
    const nameInput = document.querySelector('input[name="name"]');
    const phoneInput = document.getElementById('phoneNumber');
    const signupSelect = document.getElementById('signupChannelSelect');
    const infoInput = document.querySelector('input[name="info"]');
    const branchSelect = document.querySelector('select[name="branch_seq"]');

    if (nameInput) nameInput.value = survey.name;
    if (phoneInput) phoneInput.value = survey.phone;

    // 지점 자동 선택
    if (branchSelect && survey.branch_seq) {
        branchSelect.value = String(survey.branch_seq);
    }

    // 가입 경로 매핑
    if (signupSelect) {
        const adSourceMap = {
            '인스타 / 페이스북': '인스타그램',
            '인스타그램': '인스타그램',
            '네이버 검색': '네이버 검색',
            '지인 소개 (친구 추천)': '지인 소개',
            '지인 소개': '지인 소개',
            '전단지': '전단지',
            '홈페이지': '홈페이지'
        };
        const mapped = adSourceMap[survey.ad_source];
        if (mapped) {
            signupSelect.value = mapped;
            toggleSignupCustom(signupSelect);
        } else {
            signupSelect.value = '기타';
            toggleSignupCustom(signupSelect);
            const customInput = document.getElementById('signupChannelCustom');
            if (customInput) customInput.value = survey.ad_source;
        }
    }

    // 인적사항 자동 조합
    if (infoInput) {
        const parts = [survey.age_group, survey.gender === '남' ? '남성' : '여성', survey.occupation];
        if (survey.occupation_detail) parts.push(survey.occupation_detail);
        infoInput.value = parts.join(', ');
    }

    // 설문 참조 패널 표시
    showSurveyRef(survey);
    closeSurveyModal();
}

function showSurveyRef(survey) {
    const panel = document.getElementById('surveyRefPanel');
    const content = document.getElementById('surveyRefContent');
    const detail = document.getElementById('surveyRefDetail');

    content.innerHTML = [
        ['성함', survey.name],
        ['연락처', formatPhone(survey.phone)],
        ['성별', survey.gender === '남' ? '남성' : '여성'],
        ['연령대', survey.age_group],
        ['사는 곳', survey.location],
        ['직군', survey.occupation + (survey.occupation_detail ? ' / ' + survey.occupation_detail : '')],
        ['유입 경로', survey.ad_source],
        ['설문 일시', survey.submitted_at]
    ].map(([k, v]) => `
        <div style="display:flex; gap:0.5rem;">
            <span style="color:#2d7a4f; font-weight:600; white-space:nowrap;">${k}</span>
            <span style="color:#333;">${v}</span>
        </div>
    `).join('');

    const q = (label, val) => {
        if (!val) return '';
        const display = Array.isArray(val) ? val.join(', ') : val;
        return `<div style="display:flex; gap:0.5rem; align-items:flex-start;"><span style="color:#555; font-weight:600; white-space:nowrap; min-width:80px;">${label}</span><span style="color:#444;">${display}</span></div>`;
    };

    detail.innerHTML = [
        q('Q1 동기', survey.q1),
        q('Q2 경험', survey.q2),
        q('Q3 그만둔이유', survey.q3),
        q('Q4 선택요소', survey.q4),
        q('Q5 가능시간', survey.q5),
        q('Q6 레벨', survey.q6),
        q('Q7 목표', survey.q7),
        q('Q8 예상기간', survey.q8),
        q('Q9 관심사항', survey.q9)
    ].filter(Boolean).join('');

    panel.style.display = 'block';
}

function clearSurveyRef() {
    window.location.reload();
}

// 모달 바깥 클릭 시 닫기
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('surveyModal').addEventListener('click', function(e) {
        if (e.target === this) closeSurveyModal();
    });
});
</script>

<!-- 설문 불러오기 모달 -->
<div id="surveyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:14px; width:min(680px, 95vw); max-height:85vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,0.18);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:1px solid #e8edf0;">
            <div>
                <div style="font-size:1.1rem; font-weight:700; color:#1a1a1a;">📋 설문 정보 불러오기</div>
                <div style="font-size:0.82rem; color:#888; margin-top:2px;">설문을 선택하면 기본 정보가 자동으로 입력됩니다.</div>
            </div>
            <button onclick="closeSurveyModal()" style="background:none; border:none; font-size:1.4rem; color:#999; cursor:pointer; line-height:1;">✕</button>
        </div>
        <div style="padding:1rem 1.5rem; border-bottom:1px solid #f0f0f0;">
            <input type="text" id="surveySearch" placeholder="이름 또는 전화번호로 검색..." oninput="renderSurveyList(this.value.trim())"
                style="width:100%; padding:0.65rem 1rem; border:1.5px solid #dde8e3; border-radius:8px; font-size:0.95rem; outline:none; transition:border-color 0.2s;"
                onfocus="this.style.borderColor='#2d7a4f'" onblur="this.style.borderColor='#dde8e3'">
        </div>
        <div id="surveyList" style="padding:1rem 1.5rem; overflow-y:auto; flex:1;"></div>
    </div>
</div>

</body>
</html>
