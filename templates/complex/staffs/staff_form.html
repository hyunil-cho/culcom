{{define "dashboard/staff_form.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .assigned-class-tag {
            display: inline-flex;
            align-items: center;
            background: #f1f7fe;
            color: #4a90e2;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid #d0e3ff;
        }
        .remove-class-btn {
            margin-left: 6px;
            cursor: pointer;
            color: #ff5252;
            font-size: 1.1rem;
            line-height: 1;
        }
        .remove-class-btn:hover { color: #ff0000; }
    </style>
</head>
<body>
    {{template "complex_sidebar" .}}

    <div class="main-wrapper">
        {{template "header" .}}

        <main class="content">
            <div class="detail-actions">
                <a href="/complex/staffs" class="btn-back">← 목록으로</a>
            </div>

            <div class="content-card">
                <div class="form-header" style="display: flex; justify-content: space-between; align-items: center;">
                    {{if .IsEdit}}
                    <h2 style="margin: 0;">스태프 정보 수정 - {{.Staff.Name}}</h2>
                    <button type="button" class="btn-secondary" style="padding: 8px 15px; font-weight: 600;" onclick="openStaffAttendanceModal('{{.Staff.Name}}')">📅 출석 히스토리 보기</button>
                    {{else}}
                    <h2 style="margin: 0;">새 스태프 등록</h2>
                    {{end}}
                </div>
                <form action="/complex/staffs/update" method="POST" id="staffForm">
                    {{if .IsEdit}}
                    <input type="hidden" name="id" value="{{.Staff.ID}}">
                    {{end}}
                    <div class="form-body">
                        <div class="form-row">
                            <label class="form-label">이름 <span class="required">*</span></label>
                            <input type="text" name="name" class="form-input" value="{{.Staff.Name}}" placeholder="이름을 입력하세요" required>
                        </div>

                        <div class="form-row">
                            <label class="form-label">전화번호 <span class="required">*</span></label>
                            <input type="tel" id="phoneNumber" name="phone_number" class="form-input" value="{{.Staff.PhoneNumber}}" placeholder="01012345678" pattern="^010[0-9]{8}$" maxlength="11" required>
                        </div>

                        <div class="form-row">
                            <label class="form-label">이메일</label>
                            <input type="email" name="email" class="form-input" value="{{.Staff.Email}}" placeholder="email@example.com">
                        </div>

                        <div class="form-row">
                            <label class="form-label">담당과목</label>
                            <input type="text" name="subject" class="form-input" value="{{.Staff.Subject}}" placeholder="예: 영어 회화">
                        </div>

                        <div class="form-row">
                            <label class="form-label">역할</label>
                            <select name="role" class="form-input">
                                <option value="">-- 선택 --</option>
                                <option value="강사" {{if eq .Staff.Role "강사"}}selected{{end}}>강사</option>
                                <option value="팀장" {{if eq .Staff.Role "팀장"}}selected{{end}}>팀장</option>
                                <option value="매니저" {{if eq .Staff.Role "매니저"}}selected{{end}}>매니저</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">상태</label>
                            <select name="status" class="form-input">
                                <option value="재직" {{if eq .Staff.Status "재직"}}selected{{end}}>재직</option>
                                <option value="휴직" {{if eq .Staff.Status "휴직"}}selected{{end}}>휴직</option>
                                <option value="퇴직" {{if eq .Staff.Status "퇴직"}}selected{{end}}>퇴직</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">등록일</label>
                            <input type="date" name="join_date" class="form-input" value="{{.Staff.JoinDate}}">
                        </div>

                        <div class="form-row">
                            <label class="form-label">소속 지점 <span class="required">*</span></label>
                            <select name="branch_seq" class="form-input" id="branchSelect" required onchange="updateBranchName(this)">
                                <option value="">-- 지점 선택 --</option>
                                {{range .BranchList}}
                                <option value="{{index . "seq"}}" data-name="{{index . "name"}}" {{if eq (index . "seq") $.Staff.BranchSeq}}selected{{end}}>{{index . "name"}}</option>
                                {{end}}
                            </select>
                            <input type="hidden" name="branch_name" id="branchNameInput" value="{{.Staff.BranchName}}">
                        </div>

                        <!-- 톤앤매너에 맞춘 다중 수업 배정 -->
                        <div class="form-row">
                            <label class="form-label">담당 시간대 선택</label>
                            <select id="slotSelect" class="form-input" onchange="updateClassOptions()">
                                <option value="">-- 시간대 선택 --</option>
                                <option value="월수 오전">월수 오전팀 (10:00 ~ 12:00)</option>
                                <option value="화목 오후">화목 오후팀 (14:00 ~ 16:00)</option>
                                <option value="주말 집중">주말 집중팀 (13:00 ~ 17:00)</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <label class="form-label">수업 지정 및 추가</label>
                            <div style="display: flex; gap: 8px;">
                                <select id="classSelect" class="form-input" style="flex: 1;" disabled>
                                    <option value="">-- 시간대를 먼저 선택하세요 --</option>
                                </select>
                                <button type="button" class="btn-primary" style="padding: 0 15px; height: 38px; border-radius: 6px; white-space: nowrap; font-size: 0.85rem;" onclick="addClassToList()">➕ 추가</button>
                            </div>
                        </div>

                        <div class="form-row">
                            <label class="form-label">배정된 수업 목록</label>
                            <div id="assignedClassesContainer" style="min-height: 45px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 6px;">
                                <!-- 태그들이 여기에 표시됨 -->
                            </div>
                            <input type="hidden" name="assigned_classes" id="assignedClassesInput" value="{{.Staff.AssignedClassIDs}}">
                        </div>

                        <div class="form-row">
                            <label class="form-label">인터뷰어</label>
                            <input type="text" name="interviewer" class="form-input" value="{{.Staff.Interviewer}}" placeholder="인터뷰어 이름을 입력하세요">
                        </div>

                        <div class="form-row">
                            <label class="form-label">결제방법</label>
                            <div>
                                <select id="paymentMethodSelect" name="payment_method" class="form-input" onchange="togglePaymentCustom(this)">
                                    <option value="">-- 선택 --</option>
                                    <option value="카드" {{if eq .Staff.PaymentMethod "카드"}}selected{{end}}>카드</option>
                                    <option value="온라인구독" {{if eq .Staff.PaymentMethod "온라인구독"}}selected{{end}}>온라인구독</option>
                                    <option value="온라인신용" {{if eq .Staff.PaymentMethod "온라인신용"}}selected{{end}}>온라인신용</option>
                                    <option value="토스링크" {{if eq .Staff.PaymentMethod "토스링크"}}selected{{end}}>토스링크</option>
                                    <option value="이체(개인통장)" {{if eq .Staff.PaymentMethod "이체(개인통장)"}}selected{{end}}>이체(개인통장)</option>
                                    <option value="이체(법인통장)" {{if eq .Staff.PaymentMethod "이체(법인통장)"}}selected{{end}}>이체(법인통장)</option>
                                    <option value="현금" {{if eq .Staff.PaymentMethod "현금"}}selected{{end}}>현금</option>
                                    <option value="기타">기타 (직접입력)</option>
                                </select>
                                <input type="text" id="paymentMethodCustom" name="payment_method_custom" class="form-input" placeholder="결제방법을 직접 입력하세요" style="display: none; margin-top: 8px;">
                            </div>
                        </div>

                        <div class="form-row">
                            <label class="form-label">디파짓 금액</label>
                            <input type="text" name="deposit_amount" class="form-input" value="{{.Staff.DepositAmount}}" placeholder="예: 500,000">
                        </div>

                        <div class="form-row">
                            <label class="form-label">환급 금액</label>
                            <input type="text" name="refund_amount" class="form-input" value="{{.Staff.RefundAmount}}" placeholder="예: 200,000">
                        </div>

                        <div class="form-row">
                            <label class="form-label">비고 (코멘트)</label>
                            <textarea name="comment" class="form-input" style="height: 80px; resize: vertical; padding: 10px;" placeholder="스태프 특이사항 입력">{{.Staff.Comment}}</textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        {{if .IsEdit}}
                        <button type="submit" class="btn-primary-large">💾 수정하기</button>
                        {{else}}
                        <button type="submit" class="btn-primary-large">💾 등록하기</button>
                        {{end}}
                        <a href="/complex/staffs" class="btn-secondary-large">취소</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

<script>
const allAvailableClasses = [
    { id: "101", name: "레벨1-1반", slot: "월수 오전" },
    { id: "102", name: "레벨1-2반", slot: "월수 오전" },
    { id: "201", name: "레벨2-1반", slot: "화목 오후" },
    { id: "301", name: "주말 입문반", slot: "주말 집중" }
];

let selectedClasses = [];

// 기존 데이터 초기화
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('assignedClassesInput');
    if (input && input.value) {
        const initialIds = input.value.split(',').filter(id => id !== "");
        initialIds.forEach(id => {
            const cls = allAvailableClasses.find(c => c.id === id);
            if (cls) selectedClasses.push(cls);
        });
    }
    renderAssignedClasses();

    // 기존 저장된 결제방법이 기본 옵션에 없으면 '기타'로 처리
    const paySelect = document.getElementById('paymentMethodSelect');
    const payCustom = document.getElementById('paymentMethodCustom');
    const savedPay = paySelect.value;
    if (savedPay && !paySelect.querySelector('option[value="' + savedPay + '"]')) {
        paySelect.value = '기타';
        payCustom.style.display = 'block';
        payCustom.value = savedPay;
    }
});

function updateClassOptions() {
    const slotSelect = document.getElementById('slotSelect');
    const classSelect = document.getElementById('classSelect');
    const selectedSlot = slotSelect.value;

    classSelect.innerHTML = '<option value="">-- 수업 선택 --</option>';
    if (!selectedSlot) { classSelect.disabled = true; return; }

    allAvailableClasses.filter(c => c.slot === selectedSlot).forEach(cls => {
        const option = document.createElement('option');
        option.value = cls.id;
        option.textContent = cls.name;
        classSelect.appendChild(option);
    });
    classSelect.disabled = false;
}

function addClassToList() {
    const classSelect = document.getElementById('classSelect');
    const classId = classSelect.value;
    if (!classId) return;

    const className = classSelect.options[classSelect.selectedIndex].text;
    const slotName = document.getElementById('slotSelect').value;

    if (selectedClasses.some(c => c.id === classId)) return alert('이미 추가된 수업입니다.');

    selectedClasses.push({ id: classId, name: className, slot: slotName });
    renderAssignedClasses();
}

function removeClass(classId) {
    selectedClasses = selectedClasses.filter(c => c.id !== classId);
    renderAssignedClasses();
}

function renderAssignedClasses() {
    const container = document.getElementById('assignedClassesContainer');
    const input = document.getElementById('assignedClassesInput');

    if (selectedClasses.length === 0) {
        container.innerHTML = '<span style="color: #bbb; font-size: 0.85rem;" id="emptyMsg">배정된 수업이 없습니다.</span>';
        input.value = '';
        return;
    }

    container.innerHTML = selectedClasses.map(c => `
        <span class="assigned-class-tag">
            [${c.slot}] ${c.name}
            <span class="remove-class-btn" onclick="removeClass('${c.id}')">&times;</span>
        </span>
    `).join('');

    input.value = selectedClasses.map(c => c.id).join(',');
}

function updateBranchName(select) {
    const selected = select.options[select.selectedIndex];
    document.getElementById('branchNameInput').value = selected ? selected.getAttribute('data-name') || '' : '';
}

function togglePaymentCustom(select) {
    const customInput = document.getElementById('paymentMethodCustom');
    if (select.value === '기타') {
        customInput.style.display = 'block';
        customInput.focus();
    } else {
        customInput.style.display = 'none';
        customInput.value = '';
    }
}

// 전화번호 입력 검증
const phoneInput = document.getElementById('phoneNumber');
if (phoneInput) {
    phoneInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/[^0-9]/g, '');
        if (value.length > 11) value = value.slice(0, 11);
        e.target.value = value;
    });
}

// 출석 히스토리 모달 (수정 모드에서만 사용)
const staffAttendanceData = [];
const staffItemsPerPage = 10;
let staffCurrentPage = 1;

function generateStaffAttendance() {
    staffAttendanceData.length = 0;
    const statuses = ['O', 'O', 'O', 'O', 'O', 'O', 'X', 'O'];
    const classes = ['레벨1-1반', '레벨1-2반', '프리토킹 A반', '레벨2-1반'];
    const slots = ['월수 오전', '화목 오후', '주말 집중'];

    const today = new Date();
    for (let i = 0; i < 80; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        if (date.getDay() === 0 || date.getDay() === 6) continue;

        staffAttendanceData.push({
            date: date.toISOString().split('T')[0],
            className: classes[Math.floor(Math.random() * classes.length)],
            slotName: slots[Math.floor(Math.random() * slots.length)],
            status: statuses[Math.floor(Math.random() * statuses.length)],
            note: i % 15 === 0 ? '대체수업' : '-'
        });
    }
}

function calcAttendanceRate() {
    if (staffAttendanceData.length === 0) return 0;
    const present = staffAttendanceData.filter(d => d.status === 'O').length;
    return Math.round((present / staffAttendanceData.length) * 100);
}

function openStaffAttendanceModal(staffName) {
    if (typeof ModalManager === 'undefined') return;

    generateStaffAttendance();
    staffCurrentPage = 1;
    const rate = calcAttendanceRate();
    const total = staffAttendanceData.length;
    const present = staffAttendanceData.filter(d => d.status === 'O').length;
    const absent = total - present;

    let rateColor = '#10b981';
    if (rate < 70) rateColor = '#f44336';
    else if (rate < 85) rateColor = '#e67e22';

    ModalManager.createCustom({
        id: 'staffAttendanceModal',
        title: `출석 히스토리 - ${staffName}`,
        maxWidth: '850px',
        headerColor: '#4a90e2',
        contentBuilder: () => `
            <div style="padding: 10px; min-height: 580px; display: flex; flex-direction: column;">
                <!-- 출석률 요약 카드 -->
                <div style="display: flex; gap: 12px; margin-bottom: 15px; flex-shrink: 0;">
                    <div style="flex: 1; background: linear-gradient(135deg, ${rateColor}11, ${rateColor}22); border: 1px solid ${rateColor}44; border-radius: 10px; padding: 15px; text-align: center;">
                        <div style="font-size: 0.75rem; color: #666; margin-bottom: 4px;">평균 출석률</div>
                        <div style="font-size: 2rem; font-weight: 800; color: ${rateColor};">${rate}%</div>
                    </div>
                    <div style="flex: 1; background: #f0f7ff; border: 1px solid #d0e3ff; border-radius: 10px; padding: 15px; text-align: center;">
                        <div style="font-size: 0.75rem; color: #666; margin-bottom: 4px;">총 수업일</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #4a90e2;">${total}<span style="font-size: 0.8rem; color: #999;">일</span></div>
                    </div>
                    <div style="flex: 1; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 15px; text-align: center;">
                        <div style="font-size: 0.75rem; color: #666; margin-bottom: 4px;">출석</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #10b981;">${present}<span style="font-size: 0.8rem; color: #999;">일</span></div>
                    </div>
                    <div style="flex: 1; background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 15px; text-align: center;">
                        <div style="font-size: 0.75rem; color: #666; margin-bottom: 4px;">결석</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #f44336;">${absent}<span style="font-size: 0.8rem; color: #999;">일</span></div>
                    </div>
                </div>
                <!-- 테이블 -->
                <div style="height: 370px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; flex-shrink: 0;">
                    <table class="data-table" style="min-width: 100%; margin: 0; table-layout: fixed;">
                        <thead style="position: sticky; top: 0; z-index: 10;">
                            <tr>
                                <th style="background: #f8f9fa; width: 120px;">날짜</th>
                                <th style="background: #f8f9fa;">수업명</th>
                                <th style="background: #f8f9fa; width: 80px;">상태</th>
                                <th style="background: #f8f9fa; width: 120px;">비고</th>
                            </tr>
                        </thead>
                        <tbody id="staffAttendanceBody"></tbody>
                    </table>
                </div>
                <div id="staffPaginationRoot" style="margin-top: auto; padding-top: 15px; flex-shrink: 0;"></div>
            </div>
        `,
        buttons: [{ text: '닫기', class: 'btn-secondary', onClick: () => ModalManager.hide('staffAttendanceModal') }]
    });

    renderStaffAttendancePage(1);
}

function renderStaffAttendancePage(page) {
    staffCurrentPage = page;
    const start = (page - 1) * staffItemsPerPage;
    const end = start + staffItemsPerPage;
    const pageData = staffAttendanceData.slice(start, end);

    const body = document.getElementById('staffAttendanceBody');
    if (!body) return;

    body.innerHTML = pageData.map(item => `
        <tr>
            <td style="font-family: monospace; font-size: 0.85rem;">${item.date}</td>
            <td>
                <div style="font-weight: 600; color: #4a90e2; font-size: 0.85rem;">${item.className}</div>
                <div style="font-size: 0.75rem; color: #999;">${item.slotName}</div>
            </td>
            <td>
                <span style="display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-weight: bold; font-size: 0.75rem; ${item.status === 'O' ? 'background: #4a90e2; color: white;' : 'background: #fee; color: #f44336; border: 1px solid #fca5a5;'}">
                    ${item.status}
                </span>
            </td>
            <td style="color: #888; font-size: 0.8rem;">${item.note}</td>
        </tr>
    `).join('');

    const totalPages = Math.ceil(staffAttendanceData.length / staffItemsPerPage);
    const pages = [];
    for (let i = Math.max(1, staffCurrentPage - 2); i <= Math.min(totalPages, staffCurrentPage + 2); i++) {
        pages.push(i);
    }

    if (typeof renderPagination !== 'undefined') {
        renderPagination('#staffPaginationRoot', {
            currentPage: staffCurrentPage,
            totalPages: totalPages,
            totalItems: staffAttendanceData.length,
            pages: pages,
            hasPrev: staffCurrentPage > 1,
            hasNext: staffCurrentPage < totalPages
        }, { onPageClick: (p) => renderStaffAttendancePage(p) });
    }
}
</script>
</body>
</html>
{{end}}
