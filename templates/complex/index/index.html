{{define "dashboard/complex.html"}}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    {{template "complex_sidebar" .}}
    <div class="main-wrapper">
        {{template "header" .}}
        <main class="content">
            <div class="content-header">
                <h1>🏢 컴플렉스 대시보드</h1>
                <p>{{.SelectedBranchName}} 지점의 수업 현황 및 통계입니다.</p>
            </div>

            <div class="complex-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="content-card">
                    <h3>최근 출석률 추이</h3>
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div class="content-card">
                    <h3>지점 요약</h3>
                    <div style="margin-top: 20px;">
                        <p><strong>담당자:</strong> {{.SelectedBranchManager}}</p>
                        <p><strong>주소:</strong> {{.SelectedBranchAddress}}</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const stats = JSON.parse('{{.AttendanceStatsJSON}}');
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stats.map(s => s.date),
                    datasets: [{
                        label: '출석률 (%)',
                        data: stats.map(s => s.rate),
                        borderColor: '#4a90e2',
                        tension: 0.1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        });
    </script>
</body>
</html>
{{end}}
